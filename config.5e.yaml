
# ttrpg-convert-cli — Full 5e Configuration
#
# reprintBehavior: "newest" suppresses reprinted content — only the most
# recent version of any resource is emitted. Kills duplicates from MPMM,
# TCE subclass reprints, etc. This is also the default, but explicit is better.
#
# ⚠ Only include sources you legally own. ⚠

reprintBehavior: "newest"
"images": {
  "copyExternal": true
}
# ── Paths ────────────────────────────────────────────────────────────────────
# The CLI appends its own fixed subdirectory names under compendium/.
# These are the valid overrideable roots.
paths:
  compendium: "/"
  rules: "/rules"
"template": {
        "background": "examples/templates/tools5e/images-background2md.txt",
        "monster": "examples/templates/tools5e/monster2md-yamlStatblock-body.txt",
        "item" : "examples/templates/tools5e/images-item2md.txt",
        "race" : "examples/templates/tools5e/images-race2md.txt",
        "spell" : "examples/templates/tools5e/images-spell2md.txt"
}
# ── Sources ──────────────────────────────────────────────────────────────────
# The CLI distinguishes between:
#   book      — full text is emitted
#   adventure — full text is emitted
#   reference — only reference notes (spells, monsters, items, etc.) emitted;
#               no narrative/chapter text
# List each source only once — the CLI will figure out the rest.

sources:
  # Free / SRD (no ownership required)
  reference:
    - "srd"              # Systems Reference Document (2014)
    - "basicrules"       # D&D Basic Rules (2014)
    - "srd52"            # Systems Reference Document 5.2 (2024)
    - "basicRules2024"   # D&D Basic Rules (2024)

    # ── 2014 Core ────────────────────────────────────────────────────────────
    - "PHB"    # Player's Handbook (2014)
    - "MM"     # Monster Manual (2014)
    - "DMG"    # Dungeon Master's Guide (2014)

    # ── 2024 Core ────────────────────────────────────────────────────────────
